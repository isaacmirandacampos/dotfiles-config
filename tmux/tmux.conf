set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,xterm-ghostty:Tc"
# action key
set-option -g prefix C-b
set-option -g repeat-time 0
set-option -g focus-events on
set -g allow-passthrough on
set -g visual-activity off

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"


#### Key bindings

set-window-option -g mode-keys vi

# Navigate panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 50
bind -r J resize-pane -D 50
bind -r K resize-pane -U 50
bind -r L resize-pane -R 50

bind -r m resize-pane -Z 50

set -g mouse on

# Reload settings
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
# Open current directory
bind o run-shell "open '#{pane_current_path}'"
bind -r e kill-pane -a

# Moving window
bind-key -n C-S-Left swap-window -t -1 \; previous-window
bind-key -n C-S-Right swap-window -t +1 \; next-window

#### copy mode
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

set-option -g status-justify "left"
set-option -g history-limit 10000

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
# for vim
# set -g @resurrect-strategy-vim 'session'
# for neovim
# set -g @resurrect-strategy-nvim 'session'
# set -g @resurrect-processes '~nvim'
set -g @resurrect-processes '!nvim'

set -sg escape-time 0

# allow the title bar to adapt to whatever host you connect to
set -g set-titles on
set -g set-titles-string "#T"

# import
if-shell "uname -s | grep -q Darwin" "source ~/.config/tmux/macos.conf"

source ~/.config/tmux/theme.conf
source ~/.config/tmux/utility.conf

bind-key -r f display-popup -E -h 60% -w 50% -S "fg=#979eab" -s "bg=#282c34" -B "~/.config/tmux/tmux-sessionizer"

# Claude Code popup with persistent session per directory
bind -r a run-shell '\
  SESSION="claude-$(echo #{pane_current_path} | md5sum | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "$HOME/.local/bin/claude --continue"; \
  tmux display-popup -w80% -h80% -E "tmux attach-session -t $SESSION"'
bind-key m run-shell "tmux display-popup -E -h 80% -w 45% -x 100% -y 0 'export NEOVIM_MODE=skitty && nvim ~/workspaces/personal/Brain/current.md'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'janoamaral/tokyo-night-tmux'
set -g @plugin 'aomerk/tmux-claude-sessions'

run '~/.config/tmux/plugins/tpm/tpm'

run-shell '~/.config/tmux/window-path-override.sh'
# Statusline after TPM so it overrides tokyo-night's window format
source ~/.config/tmux/statusline.conf

