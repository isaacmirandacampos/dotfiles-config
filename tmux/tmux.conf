set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,xterm-ghostty:Tc"
# action key
set-option -g prefix M-b
set-option -g prefix2 C-b
bind-key M-b send-prefix
set-option -g repeat-time 0
set-option -g focus-events on
set -g allow-passthrough on
set -g visual-activity off

# Janelas começam em 1 e são renumeradas em sequência ao fechar/criar
set -g base-index 1
set -g renumber-windows on

# Cria nova janela sempre à direita da atual (-a) mantendo o diretório
unbind c
bind c new-window -a -c "#{pane_current_path}"

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"


#### Key bindings

set-window-option -g mode-keys vi

# Navigate panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 50
bind -r J resize-pane -D 10
bind -r K resize-pane -U 50
bind -r L resize-pane -R 10

bind -r m resize-pane -Z 50

set -g mouse on

# Reload settings
bind r source-file ~/.tmux.conf \; display "Reloaded!"
# Open current directory
bind o run-shell "open '#{pane_current_path}'"
bind -r e kill-pane -a

# Mata o processo do pane atual sem fechar o pane (útil quando Ctrl+C trava por raw mode)
bind X respawn-pane -k

# Moving window
bind-key -n C-S-Left swap-window -t -1 \; previous-window
bind-key -n C-S-Right swap-window -t +1 \; next-window

#### copy mode
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

set-option -g status-justify "left"
set-option -g history-limit 10000

# Salva o conteúdo dos panes (scrollback) junto com layout/cwd
set -g @resurrect-capture-pane-contents 'on'
# Restaura automaticamente ao iniciar o servidor tmux (ex.: após reboot)
set -g @continuum-restore 'on'
# Salva automaticamente a cada N minutos (default do continuum é 15)
set -g @continuum-save-interval '15'
# Restauração de processos no restore (pós-reboot):
#   "~claude->claude --resume" → cada pane que rodava claude reabre o PICKER de
#     conversas (claude --resume sem id). Como há vários chats no mesmo diretório,
#     o picker deixa você escolher a conversa EXATA daquele pane — o --continue
#     pegaria a errada. O histórico em si vive em ~/.claude/projects/.
#   (Helix/hx fora de propósito: não restauramos editor. nvim segue no default.)
set -g @resurrect-processes '"~claude->claude --resume"'

set -sg escape-time 0

# allow the title bar to adapt to whatever host you connect to
set -g set-titles on
set -g set-titles-string "#T"

# import
if-shell "uname -s | grep -q Darwin" "source ~/.config/tmux/macos.conf"

# Theme — uses ANSI palette so it follows the active omarchy/ghostty theme automatically.
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=default,fg=default"
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""
set -gw automatic-rename on
set -gw automatic-rename-format '#{b:pane_current_path}'

set -g status-left "#[fg=black,bg=blue,bold] #S #[bg=default] "
set -g status-right "#[fg=blue]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]#h "
set -g window-status-format "#[fg=white] #I:#W "
set -g window-status-current-format "#[fg=black,bg=blue,bold] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=black"
setw -g clock-mode-colour blue

source ~/.config/tmux/utility.conf

bind-key -r f display-popup -E -h 60% -w 50% -S "fg=#979eab" -s "bg=#282c34" -B "~/.config/tmux/tmux-sessionizer"

# Cria nova sessão nomeada (entra direto) — pra contextos fora de ~/workspaces/
bind C command-prompt -p "Nova sessão:" "new-session -s '%%'"
# Variante: cria detached, fica na sessão atual
bind A command-prompt -p "Nova sessão (background):" "new-session -d -s '%%'"

# Claude Code popup with persistent session per directory
bind -r a run-shell '\
  SESSION="claude-$(echo #{pane_current_path} | md5sum | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "$HOME/.local/bin/claude --continue"; \
  tmux display-popup -w80% -h80% -E "tmux attach-session -t $SESSION"'

# Scooter popup (standalone) — "e" abre arquivo numa nova instância de hx dentro do popup
bind R display-popup -d '#{pane_current_path}' -w80% -h80% -E 'EDITOR=hx scooter'

bind-key m run-shell "tmux display-popup -E -h 80% -w 45% -x 100% -y 0 'export NEOVIM_MODE=skitty && nvim ~/workspaces/personal/Brain/current.md'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'aomerk/tmux-claude-sessions'

run '~/.config/tmux/plugins/tpm/tpm'

run-shell '~/.config/tmux/window-path-override.sh'

