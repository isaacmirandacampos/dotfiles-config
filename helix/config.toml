theme = "onedark_transparent"

[editor]
rulers = [120]
idle-timeout = 30
color-modes = true
line-number = "relative"
bufferline = "multiple"
auto-completion = true
auto-format = true
mouse = true
end-of-line-diagnostics = "hint"
auto-info = false
completion-timeout = 5
cursorline = true
# use system clipboard
default-yank-register = "+"
idle-timeout = 5
inline-diagnostics.cursor-line = "hint"
lsp.auto-signature-help = false
smart-tab.enable = false
soft-wrap.enable = true


[editor.inline-diagnostics]
cursor-line = "warning"

[editor.lsp]
display-messages = true
display-inlay-hints = false

[editor.indent-guides]
render = true
character = "|"
skip-levels = 1

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.statusline]
left = ["mode", "spinner", "file-name"]
center = ["position"]
right = ["selections", "file-encoding", "version-control"]
separator = "|"
mode.normal = "N"
mode.insert = "I"
mode.select = "S"

[keys.normal.space]
# Copy entire buffer into clipboard:
"space" = ["save_selection", "select_all", "yank_main_selection_to_clipboard", "jump_backward"]


[editor.indent-guides]
character = "╎"
render = true
skip-levels = 1

[keys.normal]
"{" = ["goto_next_paragraph"]
"}" = ["goto_prev_paragraph"]

# lazygit integration
C-g = [
  ":write-all",
  ":insert-output lazygit >/dev/tty",
  ":redraw",
  ":reload-all"
]
# --- yazi integration
space.e = [
  ":sh rm -f /tmp/unique-file-u41ae14",
  ":insert-output yazi '%{buffer_name}' --chooser-file=/tmp/unique-file-u41ae14",
  ":insert-output echo \"x1b[?1049h\" > /dev/tty",
  ":open %sh{cat /tmp/unique-file-u41ae14}",
  ":redraw"
]
space.E = [
  ":sh rm -f /tmp/unique-file-h21a434",
  ":insert-output yazi '%{workspace_directory}' --chooser-file=/tmp/unique-file-h21a434",
  ":insert-output echo \"x1b[?1049h\" > /dev/tty",
  ":open %sh{cat /tmp/unique-file-h21a434}",
  ":redraw"
]
# ---


