# ── Language Servers ──────────────────────────────────────────

[language-server.typescript-language-server]
command = "typescript-language-server"
args = ["--stdio"]

# O typescript-language-server não traz o tsserver embutido: ele procura
# node_modules/typescript a partir do workspace root. Em monorepos onde a raiz
# não tem o pacote (o TS vive em subprojetos), o LSP falha no initialize e some
# com TODOS os diagnósticos. Apontamos para o typescript global do mise.
[language-server.typescript-language-server.config]
tsserver.path = "/home/isaacdmcampos/.local/share/mise/installs/npm-typescript/latest/lib/node_modules/typescript/lib/tsserver.js"

[language-server.pyright]
command = "pyright-langserver"
args = ["--stdio"]

[language-server.ruff]
command = "ruff"
args = ["server"]

[language-server.gopls]
command = "gopls"

[language-server.lua-language-server]
command = "lua-language-server"

[language-server.marksman]
command = "marksman"
args = ["server"]

[language-server.yaml-language-server]
command = "yaml-language-server"
args = ["--stdio"]

[language-server.taplo]
command = "taplo"
args = ["lsp", "stdio"]

[language-server.buf]
command = "buf"
args = ["beta", "lsp"]

[language-server.vscode-html-language-server]
command = "vscode-html-language-server"
args = ["--stdio"]

[language-server.vscode-css-language-server]
command = "vscode-css-language-server"
args = ["--stdio"]

[language-server.vscode-json-language-server]
command = "vscode-json-language-server"
args = ["--stdio"]

[language-server.docker-langserver]
command = "docker-langserver"
args = ["--stdio"]

[language-server.prisma-language-server]
command = "prisma-language-server"
args = ["--stdio"]

[language-server.sqls]
command = "sqls"

[language-server.biome]
command = "biome"
args = ["lsp-proxy"]

[language-server.tailwindcss-ls]
command = "tailwindcss-language-server"
args = ["--stdio"]

[language-server.eslint]
command = "vscode-eslint-language-server"
args = ["--stdio"]

[language-server.eslint.config]
validate = "on"
run = "onType"

[language-server.eslint.config.workingDirectory]
mode = "auto"

# ── Languages ────────────────────────────────────────────────

[[language]]
name = "typescript"
# Em monorepos: ancora o LSP no diretório do subprojeto (que tem tsconfig.json/
# package.json + node_modules com @types/jest etc.), e não no git root, onde o
# tsserver não acha os tipos do test runner ("Cannot find name 'describe'").
roots = ["tsconfig.json", "package.json"]
language-servers = [
  { name = "typescript-language-server", except-features = ["format"] },
  "eslint",
]
formatter = { command = "prettier", args = ["--parser", "typescript"] }
auto-format = true

[[language]]
name = "tsx"
roots = ["tsconfig.json", "package.json"]
language-servers = [
  { name = "typescript-language-server", except-features = ["format"] },
  "eslint",
]
formatter = { command = "prettier", args = ["--parser", "typescript"] }
auto-format = true

[[language]]
name = "javascript"
roots = ["tsconfig.json", "package.json"]
language-servers = [
  { name = "typescript-language-server", except-features = ["format"] },
  "eslint",
]
formatter = { command = "prettier", args = ["--parser", "babel"] }
auto-format = true

[[language]]
name = "jsx"
roots = ["tsconfig.json", "package.json"]
language-servers = [
  { name = "typescript-language-server", except-features = ["format"] },
  "eslint",
]
formatter = { command = "prettier", args = ["--parser", "babel"] }
auto-format = true

[[language]]
name = "python"
language-servers = ["pyright", "ruff"]
formatter = { command = "ruff", args = ["format", "-"] }
auto-format = true

[[language]]
name = "go"
language-servers = ["gopls"]
formatter = { command = "gofmt" }
auto-format = true

[[language]]
name = "markdown"
language-servers = ["marksman"]
formatter = { command = "prettier", args = ["--parser", "markdown", "--prose-wrap", "preserve"] }
auto-format = true

[[language]]
name = "yaml"
language-servers = ["yaml-language-server"]
formatter = { command = "prettier", args = ["--parser", "yaml"] }
auto-format = true

[[language]]
name = "toml"
language-servers = ["taplo"]
formatter = { command = "taplo", args = ["fmt", "-"] }
auto-format = true

[[language]]
name = "protobuf"
language-servers = ["buf"]

[[language]]
name = "lua"
language-servers = ["lua-language-server"]
auto-format = true

[[language]]
name = "html"
language-servers = ["vscode-html-language-server", "tailwindcss-ls"]
formatter = { command = "prettier", args = ["--parser", "html"] }
auto-format = true

[[language]]
name = "css"
language-servers = ["vscode-css-language-server", "tailwindcss-ls"]
formatter = { command = "prettier", args = ["--parser", "css"] }
auto-format = true

[[language]]
name = "json"
language-servers = [
  { name = "vscode-json-language-server", except-features = ["format"] },
  "biome",
]
formatter = { command = "biome", args = ["format", "--stdin-file-path=_.json"] }
auto-format = true

[[language]]
name = "jsonc"
formatter = { command = "biome", args = ["format", "--stdin-file-path=_.jsonc"] }
auto-format = true

[[language]]
name = "dockerfile"
language-servers = ["docker-langserver"]

[[language]]
name = "prisma"
language-servers = ["prisma-language-server"]
auto-format = true

[[language]]
name = "sql"
language-servers = ["sqls"]
