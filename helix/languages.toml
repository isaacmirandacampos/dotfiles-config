[language-server.biome]
command = "biome"
args = ["lsp-proxy"]

[language-server.rust-analyzer.config]
cargo.allFeatures = true
check.command = "clippy"

[language-server.tailwindcss-ls]
command = "tailwindcss-language-server"
args = ["--stdio"]

[languagec-server.tombi]
command = "tombi"
args = ["lsp"]

[[language]]
name = "typescript"
language-servers = [
  { name = "typescript-language-server", except-features = ["format"] },
  "efm-lsp-prettier"
]
formatter = { command = "prettier", args = ["--parser", "typescript"] }
auto-format = true

[[language]]
name = "tsx"
language-servers = [
  { name = "typescript-language-server", except-features = ["format"] },
  "efm-lsp-prettier"
]
formatter = { command = "prettier", args = ["--parser", "typescript"] }
auto-format = true

# JavaScript
[[language]]
name = "javascript"
language-servers = [
  { name = "typescript-language-server", except-features = ["format"] },
  "efm-lsp-prettier"
]
formatter = { command = "prettier", args = ["--parser", "babel"] }
auto-format = true

# Python
[[language]]
name = "python"
language-servers = [
  { name = "pyright", except-features = ["format"] },
  "efm-lsp-black"
]
formatter = { command = "black", args = ["-"] }
auto-format = true

# Go
[[language]]
name = "go"
language-servers = ["gopls"]
formatter = { command = "gofmt" }
auto-format = true

[[language]]
name = "json"
language-servers = [
  { name = "vscode-json-language-server", except-features = ["format"] },
  "biome",
  "tailwindcss-ls"
]
formatter = { command = "biome", args = ["format", "--stdin-file-path=_.json"] }
auto-format = true

[[language]]
name = "jsonc"
formatter = { command = "biome", args = ["format", "--stdin-file-path=_.jsonc"] }
auto-format = true

[[language]]
name = "toml"
language-servers = []
