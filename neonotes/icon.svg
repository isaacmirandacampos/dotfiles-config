<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2030"/>
      <stop offset="100%" stop-color="#181926"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#89dceb"/>
      <stop offset="100%" stop-color="#74c7ec"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <!-- Notebook body -->
  <rect x="300" y="230" width="440" height="564" rx="32" fill="none" stroke="url(#accent)" stroke-width="36"/>
  <!-- Notebook spine rings -->
  <line x1="380" y1="230" x2="380" y2="794" stroke="url(#accent)" stroke-width="4" opacity="0.3"/>
  <circle cx="380" cy="330" r="14" fill="none" stroke="url(#accent)" stroke-width="8"/>
  <circle cx="380" cy="440" r="14" fill="none" stroke="url(#accent)" stroke-width="8"/>
  <circle cx="380" cy="550" r="14" fill="none" stroke="url(#accent)" stroke-width="8"/>
  <circle cx="380" cy="660" r="14" fill="none" stroke="url(#accent)" stroke-width="8"/>
  <!-- Text lines -->
  <line x1="430" y1="370" x2="670" y2="370" stroke="url(#accent)" stroke-width="20" stroke-linecap="round"/>
  <line x1="430" y1="440" x2="640" y2="440" stroke="url(#accent)" stroke-width="20" stroke-linecap="round" opacity="0.7"/>
  <line x1="430" y1="510" x2="660" y2="510" stroke="url(#accent)" stroke-width="20" stroke-linecap="round" opacity="0.5"/>
  <line x1="430" y1="580" x2="580" y2="580" stroke="url(#accent)" stroke-width="20" stroke-linecap="round" opacity="0.35"/>
  <!-- Pen -->
  <g transform="rotate(-45, 680, 280)">
    <rect x="660" y="180" width="40" height="220" rx="6" fill="url(#accent)" opacity="0.9"/>
    <polygon points="660,400 680,440 700,400" fill="url(#accent)" opacity="0.9"/>
  </g>
</svg>
