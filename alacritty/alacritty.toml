[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { style = "Bold" }
italic = { style = "Italic" }
bold_italic = { style = "Bold Italic" }
size = 16.0

[cursor.style]
shape = "Block"
blinking = "Never"

[window]
opacity = 0.65
blur = true
decorations = "Buttonless"
padding = { x = 2, y = 2 }

[window.dimensions]
columns = 130
lines = 40

# One Dark theme
[colors.primary]
background = "#282c34"
foreground = "#979eab"

[colors.cursor]
cursor = "#cccccc"

[colors.selection]
background = "#979eab"
text = "#282c34"

[colors.normal]
black = "#282c34"
red = "#e06c75"
green = "#98c379"
yellow = "#e5c07b"
blue = "#61afef"
magenta = "#be5046"
cyan = "#56b6c2"
white = "#979eab"

[colors.bright]
black = "#393e48"
red = "#d19a66"
green = "#56b6c2"
yellow = "#e5c07b"
blue = "#61afef"
magenta = "#be5046"
cyan = "#56b6c2"
white = "#abb2bf"

[bell]
duration = 0

# Keybinds — Ctrl+F sends \x14
[[keyboard.bindings]]
key = "F"
mods = "Control"
chars = "\u0014"

# Shift+Enter
[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001b[13;2u"

# Ctrl+Shift+Left/Right: beginning/end of line
[[keyboard.bindings]]
key = "Left"
mods = "Control|Shift"
chars = "\u0001"

[[keyboard.bindings]]
key = "Right"
mods = "Control|Shift"
chars = "\u0005"

# Alt+Left/Right: jump between words
[[keyboard.bindings]]
key = "Left"
mods = "Alt"
chars = "\u001bb"

[[keyboard.bindings]]
key = "Right"
mods = "Alt"
chars = "\u001bf"

# Alt+Shift+Left/Right: beginning/end of line
[[keyboard.bindings]]
key = "Left"
mods = "Alt|Shift"
chars = "\u0001"

[[keyboard.bindings]]
key = "Right"
mods = "Alt|Shift"
chars = "\u0005"
